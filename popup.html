<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Open Multiple URLs</title>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6H6C4.89543 6 4 6.89543 4 8V18C4 19.1046 4.89543 20 6 20H16C17.1046 20 18 19.1046 18 18V14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 4H20M20 4V10M20 4L10 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Open Multiple URLs</h1>
        <p class="subtitle">Paste links, launch all at once</p>
      </div>
    </div>

    <!-- URL Counter -->
    <div class="url-counter">
      <span id="urlCount">0</span>
      <span class="counter-label">URLs detected</span>
    </div>

    <!-- Textarea -->
    <div class="textarea-wrapper">
      <textarea id="urlInput" placeholder="Paste your URLs here&#10;One URL per line&#10;&#10;https://google.com&#10;https://github.com&#10;https://example.com"></textarea>
      <button class="clear-btn" id="clearBtn" title="Clear all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Options Row -->
    <div class="options-row">
      <label class="toggle-label">
        <input type="checkbox" id="newWindowToggle" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-text">New window</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="dedupeToggle" checked />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-text">Remove duplicates</span>
      </label>
    </div>

    <!-- Open Button -->
    <button id="openBtn" class="open-btn">
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-text">Open All URLs</span>
      <span class="btn-ripple"></span>
    </button>

    <!-- Feedback -->
    <div id="feedback" class="feedback"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
